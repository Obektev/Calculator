# Лабораторная работа #07.
# Конфигурационный файл ресурсов приложения Simple Calculator.

window.width=560
window.height=780

# Доступные стили:
# lowVisionLight, lowVisionDark, masculine, feminine, children, youth, adult, senior
ui.style=lowVisionDark
ui.background=#121212
ui.font.family=SansSerif
ui.font.size=20

# Демонстрационные параметры подключения. Приложение их загружает и показывает
# в окне диагностики конфигурации, но калькулятор не подключается к БД.
db.url=jdbc:sqlite:calculator.db
db.user=calculator
db.password=
